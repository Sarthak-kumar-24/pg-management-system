<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PG Pro — Welcome Registration</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script>
    if (localStorage.getItem('pt_token') && localStorage.getItem('pt_tenant')) {
        // Instantly redirect them to their dashboard before the registration form even loads
        window.location.href = '/tenant.html'; 
    }
  </script>
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">

  <div class="card" style="max-width: 450px; width: 100%; animation: popIn 0.4s ease;">
    <div style="text-align: center; margin-bottom: 20px;">
      <div class="stat-ico ico-gold" style="font-size: 32px; width: 60px; height: 60px; margin: 0 auto 10px;">👋</div>
      <h2 style="font-family: 'Playfair Display', serif;">Welcome to Pratham PGs</h2>
      <p id="roomWelcomeText" class="c-muted tx-sm mt-2">Loading room details...</p>
    </div>

    <form id="onboardForm" onsubmit="submitRegistration(event)">
      <div class="fg">
        <label class="fl">Full Name *</label>
        <input type="text" id="obName" class="fc" placeholder="Enter your name" required>
      </div>
      
      <div class="fg">
        <label class="fl">Phone Number *</label>
        <input type="tel" id="obPhone" class="fc" placeholder="10-digit mobile number" required maxlength="15">
        <div class="fhint">This will be your login ID for the portal.</div>
      </div>

      <div class="fr">
        <div class="fg">
          <label class="fl">Emergency Contact Name *</label>
          <input type="text" id="obEmName" class="fc" required>
        </div>
        <div class="fg">
          <label class="fl">Emergency Phone *</label>
          <input type="tel" id="obEmPhone" class="fc" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-full mt-4" id="submitBtn" style="justify-content: center;">
        Complete Registration
      </button>
    </form>
    <div style="text-align: center; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--b1);">
      <p style="font-size: 13px; color: var(--tx2); margin-bottom: 10px;">Already registered in this room?</p>
      <a href="/tenant.html" class="btn btn-sec btn-sm" style="text-decoration: none;">
        Log In Here →
      </a>
    </div>
  </div>

  <script>
    // 1. Extract Room ID from the QR Code URL (e.g., ?room=123abc456def)
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room');

    // 2. Fetch Room Details immediately to welcome the user
    window.onload = async () => {
      if (!roomId) {
        document.getElementById('roomWelcomeText').innerHTML = "<span class='c-red'>Invalid QR Code. Please contact the owner.</span>";
        document.getElementById('submitBtn').disabled = true;
        return;
      }
      try {
        const res = await fetch(`/api/tenants/public/room/${roomId}`);
        const room = await res.json();
        if (res.ok) {
          document.getElementById('roomWelcomeText').innerHTML = `Registering for <strong>${room.building.name} — Room ${room.roomNumber}</strong>`;
        }
      } catch (e) {
        document.getElementById('roomWelcomeText').innerText = "Ready to register.";
      }
    };

    // 3. Submit Data to Backend
    async function submitRegistration(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.textContent = "Registering...";
      btn.disabled = true;

      const payload = {
        roomId: roomId,
        name: document.getElementById('obName').value,
        phone: document.getElementById('obPhone').value,
        emergencyName: document.getElementById('obEmName').value,
        emergencyPhone: document.getElementById('obEmPhone').value
      };

      try {
        const res = await fetch('/api/tenants/public/onboard', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        const result = await res.json();
        
        if (!res.ok) throw new Error(result.error);

        // 4. Success! Redirect them to your beautiful Tenant Portal
        alert("Registration Successful! You will now be redirected to your Tenant Portal.");
        window.location.href = "/tenant.html"; 

      } catch (error) {
        alert("Registration Failed: " + error.message);
        btn.textContent = "Complete Registration";
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
